name: Deploy to GitHub Pages

# Rebuild and publish the game to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the official Pages deploy action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a newer run supersede an in-flight one, but never cancel a real deploy midway.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Project site lives at /turbo-deck/, so the asset base must match.
      - run: npm run build -- --base=/turbo-deck/
      - run: touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
