name: Deploy to GitHub Pages

# Builds the Vite renderer and publishes it to GitHub Pages so the game
# can be played from a shareable URL. Runs on pushes to the deploy branch
# and can be kicked off manually from the Actions tab.
on:
  push:
    branches:
      - claude/gracious-pasteur-9u9zv2
  workflow_dispatch:

# Allow the workflow to publish Pages; only one deploy at a time.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (source: GitHub Actions) on the first run so no
          # manual repo-settings step is needed.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
